<ion-header>
  <ion-toolbar>
    <ion-title>Competições</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input [(ngModel)]="name" placeholder="Nome da competição"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="addCompetition()">
    Criar competição
  </ion-button>

  <ion-list>
    <ion-item *ngFor="let comp of competitions" (click)="goToCategories(comp.id)">
      {{ comp.name }}
    </ion-item>
  </ion-list>

</ion-content>
