<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>

    <ion-title>Competições</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input [(ngModel)]="name" placeholder="Nome da competição"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="addCompetition()">
    {{ editingId ? 'Atualizar competição' : 'Criar competição' }}
  </ion-button>

  <ion-list>
    <ion-item *ngFor="let comp of competitions" (click)="goToCategories(comp.id)">

      <ion-label>
        {{ comp.name }}
      </ion-label>

      <ion-button (click)="goToJudges(comp.id); $event.stopPropagation()">
        Juízes
      </ion-button>

      <ion-button size="small" (click)="editCompetition(comp); $event.stopPropagation()">
        Editar
      </ion-button>

      <ion-button size="small" color="danger" (click)="deleteCompetition(comp.id); $event.stopPropagation()">
        Excluir
      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
